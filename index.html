<title>VIP Flow</title>

<style>
body {
    margin: 0;
    background: #001f3f;
    font-family: sans-serif;
    overflow: hidden;
}

/* рџЊ§пёЏ Rain */
.rain {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.drop {
    position: absolute;
    top: -100px;
    width: 3px;
    height: 35px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
    border-radius: 50%;
    opacity: 0.7;
    animation: rain linear infinite;
}

@keyframes rain {
    to { transform: translateY(110vh); }
}

/* рџ‘‘ Welcome */
#welcome {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 30px;
    color: gold;
    z-index: 2;
    text-shadow:
        0 1px 0 #c9a000,
        0 2px 0 #b89000,
        0 3px 0 #a08000,
        0 0 20px gold;
}

/* рџ“± Center UI */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    width: 90%;
    max-width: 350px;
    background: rgba(0,0,0,0.85);
    padding: 20px;
    border: 2px solid gold;
    border-radius: 15px;
    text-align: center;
    display: none;
    z-index: 3;
    max-height: 80vh;
    overflow-y: auto;
}

/* рџ”Ґ Title */
.title {
    color: gold;
    font-weight: bold;
    font-size: 18px;
    margin-bottom: 10px;
    text-shadow: 0 0 10px gold;
}

/* вњЁ Input */
input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: 1px solid gold;
    background: #fff;
    color: #000;
    text-align: center;
    box-sizing: border-box;
}

/* рџљЂ Button */
button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    background: gold;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 8px;
}

/* рџ“Љ Result */
.result {
    margin-top: 15px;
    display: none;
    color: white;
    text-align: left;
    background: rgba(255, 215, 0, 0.1);
    padding: 15px;
    border-radius: 8px;
    border: 1px dashed gold;
    font-size: 14px;
    line-height: 1.5;
}

.result code {
    background: rgba(255, 255, 255, 0.2);
    padding: 2px 4px;
    border-radius: 4px;
}

/* в­ђ Footer */
.footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    color: gold;
    z-index: 3;
    text-shadow: 0 0 10px gold;
}
</style>
</head>

<body>

<div class="rain" id="rain"></div>

<div id="welcome"></div>

<div class="container" id="mainUI">
    
    <div class="title">NUMBER INFO BOT</div>

    <input type="text" id="numInput" placeholder="Enter Number">
    <button onclick="show()">Search</button>

    <div class="result" id="resultBox"></div>
</div>

let rainBox = document.getElementById("rain");

for (let i = 0; i < 50; i++) {
    let d = document.createElement("div");
    d.className = "drop";
    d.style.left = Math.random()*100 + "vw";
    d.style.animationDuration = (2 + Math.random()*2) + "s";
    rainBox.appendChild(d);
}

// вњЌпёЏ Typing Effect
const text = "рџ‘‘ WELCOME NUMBER INFORMATION BOT рџ‘‘";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("welcome").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 80);
    } else {
        setTimeout(() => {
            document.getElementById("welcome").style.display = "none";
            document.getElementById("mainUI").style.display = "block";
        }, 1000);
    }
}

typeEffect();

// Text formatter to HTML
function formatResult(dataStr) {
    let formatted = dataStr.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'); // Bold tag conversion
    formatted = formatted.replace(/`(.*?)`/g, '<code>$1</code>');   // Code tag conversion
    formatted = formatted.replace(/\n/g, '<br>');                   // Line break conversion
    return formatted;
}

// рџ”Ќ Search Function
function show() {
    let rawInput = document.getElementById("numInput").value.trim();
    let r = document.getElementById("resultBox");
    r.style.display = "block";

    if (rawInput === "") {
        r.innerHTML = "вљ пёЏ Please enter a valid number.";
        return;
    }

    // Clean input (+91 hatane ke liye)
    let searchKey = rawInput.replace(/^\+91/, '').replace(/\s/g, '');

    // Database check
    if (numberDatabase[searchKey]) {
        r.innerHTML = `<div style="margin-bottom: 10px; font-size: 16px; border-bottom: 1px solid gold; padding-bottom: 5px;">вњ… <b>Record Found</b></div>` 
                      + formatResult(numberDatabase[searchKey]);
    } else {
        r.innerHTML = `вќЊ <b>No Data Found</b><br><br>The number "${rawInput}" is not in the database.`;
    }
}
